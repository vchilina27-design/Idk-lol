<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tank Battle iOS</title>
    <style>
        body { margin: 0; background: #222; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; background: #000; margin: 0 auto; border: 2px solid #555; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
        #controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-around; pointer-events: auto; }
        .btn { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; items-center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        Score: <span id="score">0</span> | Lives: <span id="lives">3</span>
    </div>
    <canvas id="gameCanvas"></canvas>

    <div id="controls">
        <div id="joystick" style="width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; position: relative;">
            <div id="stick" style="width: 40px; height: 40px; background: #888; border-radius: 50%; position: absolute; top: 40px; left: 40px;"></div>
        </div>
        <div id="fireBtn" class="btn" style="width: 80px; height: 80px; background: rgba(255,0,0,0.4); margin-top: 20px;">FIRE</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight * 0.7;

        let score = 0;
        let lives = 3;

        class Tank {
            constructor(x, y, color, type) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.type = type; // 'player', 'ally', 'enemy'
                this.size = 30;
                this.angle = 0;
                this.speed = type === 'player' ? 3 : 2;
                this.bullets = [];
                this.lastShot = 0;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.fillStyle = '#333';
                ctx.fillRect(0, -5, 20, 10); // Barrel
                ctx.restore();

                this.bullets.forEach((b, i) => {
                    b.x += Math.cos(b.angle) * 5;
                    b.y += Math.sin(b.angle) * 5;
                    ctx.fillStyle = 'yellow';
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, 3, 0, Math.PI*2);
                    ctx.fill();
                    if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                        this.bullets.splice(i, 1);
                    }
                });
            }

            fire() {
                const now = Date.now();
                if (now - this.lastShot > 500) {
                    this.bullets.push({ x: this.x, y: this.y, angle: this.angle });
                    this.lastShot = now;
                }
            }
        }

        const player = new Tank(100, 100, 'green', 'player');
        const allies = [new Tank(150, 100, 'blue', 'ally')];
        const enemies = [new Tank(canvas.width - 100, canvas.height - 100, 'red', 'enemy')];

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw player
            player.draw();

            // Draw allies
            allies.forEach(a => {
                a.draw();
                // Simple AI: move towards random enemy
                if (enemies.length > 0) {
                    const target = enemies[0];
                    a.angle = Math.atan2(target.y - a.y, target.x - a.x);
                    a.x += Math.cos(a.angle) * a.speed;
                    a.y += Math.sin(a.angle) * a.speed;
                    if (Math.random() < 0.02) a.fire();
                }
            });

            // Draw enemies
            enemies.forEach((e, ei) => {
                e.draw();
                // Move towards player
                e.angle = Math.atan2(player.y - e.y, player.x - e.x);
                e.x += Math.cos(e.angle) * e.speed;
                e.y += Math.sin(e.angle) * e.speed;
                if (Math.random() < 0.01) e.fire();

                // Collision with player bullets
                player.bullets.forEach((b, bi) => {
                    const dist = Math.hypot(b.x - e.x, b.y - e.y);
                    if (dist < e.size/2) {
                        enemies.splice(ei, 1);
                        player.bullets.splice(bi, 1);
                        score += 100;
                        scoreEl.innerText = score;
                        // Spawn new enemy
                        setTimeout(() => {
                            enemies.push(new Tank(canvas.width - 50, Math.random() * canvas.height, 'red', 'enemy'));
                        }, 2000);
                    }
                });
            });

            requestAnimationFrame(update);
        }

        // Controls
        let keys = {};
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        setInterval(() => {
            if (keys['ArrowUp']) {
                player.x += Math.cos(player.angle) * player.speed;
                player.y += Math.sin(player.angle) * player.speed;
            }
            if (keys['ArrowLeft']) player.angle -= 0.1;
            if (keys['ArrowRight']) player.angle += 0.1;
            if (keys['Space']) player.fire();
        }, 30);

        // Touch Control logic (Simplified)
        document.getElementById('fireBtn').ontouchstart = () => player.fire();

        update();
    </script>
</body>
</html>
