<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Tasko</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3b5de8',
            surface: '#f3f5fb',
            card: '#ffffff',
            border: '#e4e8f5',
            muted: '#f0f2fa',
            'muted-fg': '#8492b4',
          }
        }
      }
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { background: #f3f5fb; font-family: -apple-system, sans-serif; }
    .safe-top { padding-top: env(safe-area-inset-top, 16px); }
  </style>
</head>
<body class="bg-surface min-h-screen">
  <div class="safe-top bg-primary text-white p-6 rounded-b-3xl shadow-lg">
    <h1 class="text-2xl font-bold">Task Manager</h1>
    <p class="opacity-70">Welcome back, Alex</p>
  </div>
  <main class="p-4">
    <div id="task-list" class="space-y-3"></div>
  </main>
  <script>
    const tasks = [
      { title: 'Setup iOS Container', done: true },
      { title: 'Import v0 Design', done: true },
      { title: 'Install via Esign', done: false }
    ];
    document.getElementById('task-list').innerHTML = tasks.map(t => `
      <div class="bg-white p-4 rounded-2xl shadow-sm flex items-center gap-3">
        <div class="w-6 h-6 border-2 border-primary rounded-full flex items-center justify-center">
          ${t.done ? '<div class="w-3 h-3 bg-primary rounded-full"></div>' : ''}
        </div>
        <span class="${t.done ? 'line-through opacity-50' : 'font-semibold'}">${t.title}</span>
      </div>
    `).join('');
  </script>
</body>
</html>
