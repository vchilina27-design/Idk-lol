<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Tank Battle Mobile/PC</title>
    <style>
        body { margin: 0; overflow: hidden; background: #05050a; color: white; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .stat { font-size: 20px; margin-bottom: 4px; text-shadow: 2px 2px 4px #000; font-weight: bold; }

        /* Mobile Controls */
        #mobile-controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; z-index: 20; }
        #joystick-container { width: 140px; height: 140px; background: rgba(255,255,255,0.1); border-radius: 50%; position: relative; border: 2px solid rgba(255,255,255,0.2); }
        #joystick-knob { width: 60px; height: 60px; background: rgba(255,255,255,0.4); border-radius: 50%; position: absolute; top: 40px; left: 40px; border: 2px solid #fff; }
        #fire-button { width: 100px; height: 100px; background: rgba(255, 0, 0, 0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 24px; border: 3px solid rgba(255,255,255,0.3); color: white; text-shadow: 1px 1px 2px #000; -webkit-user-select: none; }
        #fire-button:active { background: rgba(255, 0, 0, 0.7); transform: scale(0.9); }

        @media (min-width: 1024px) {
            #mobile-controls { display: none; } /* Hide on PC */
        }

        .red { color: #f44; }
        .blue { color: #44f; }
        .green { color: #4f4; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stat green">Score: <span id="score">0</span></div>
        <div class="stat">Armor: <span id="armor">100</span>%</div>
        <div class="stat blue">Team: <span id="team-count">1</span></div>
        <div class="stat red">Enemies: <span id="enemy-count">1</span></div>
    </div>

    <div id="mobile-controls">
        <div id="joystick-container">
            <div id="joystick-knob"></div>
        </div>
        <div id="fire-button">FIRE</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- CONSTANTS ---
        const WORLD_SIZE = 80;
        const TANK_SPEED = 0.22;
        const TANK_TURN_SPEED = 0.05;
        const BULLET_SPEED = 1.2;
        const COLLISION_RADIUS = 2.0;

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.012);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(30, 60, 30);
        dirLight.castShadow = true;
        scene.add(dirLight);
        scene.add(new THREE.AmbientLight(0x404080, 0.5));

        // --- WORLD ---
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x1a1a2e }));
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const obstacles = [];
        function createObstacle(x, z, w, h, d) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color: 0x444466 }));
            mesh.position.set(x, h/2, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            obstacles.push({ box: new THREE.Box3().setFromObject(mesh) });
        }
        createObstacle(20, 20, 10, 6, 10);
        createObstacle(-30, -10, 8, 8, 8);
        createObstacle(0, 0, 5, 10, 5);

        // --- ACTORS ---
        class Bullet {
            constructor(pos, angle, color) {
                this.mesh = new THREE.Mesh(new THREE.SphereGeometry(0.35), new THREE.MeshBasicMaterial({ color }));
                this.mesh.position.copy(pos);
                this.velocity = new THREE.Vector3(Math.sin(angle), 0, Math.cos(angle)).multiplyScalar(BULLET_SPEED);
                this.active = true;
                scene.add(this.mesh);
            }
            update() {
                this.mesh.position.add(this.velocity);
                if (this.mesh.position.length() > 150) this.destroy();
            }
            destroy() { this.active = false; scene.remove(this.mesh); }
        }

        class Tank {
            constructor(x, z, color, type) {
                this.type = type;
                this.group = new THREE.Group();
                this.group.position.set(x, 0.5, z);
                const hull = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1, 3.5), new THREE.MeshStandardMaterial({ color }));
                hull.castShadow = true;
                this.group.add(hull);
                this.turret = new THREE.Group();
                const turretBase = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.8, 1.5), new THREE.MeshStandardMaterial({ color }));
                turretBase.position.y = 0.8;
                this.turret.add(turretBase);
                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 2.5), new THREE.MeshStandardMaterial({ color: 0x111111 }));
                barrel.rotation.x = Math.PI / 2; barrel.position.set(0, 0.8, 1.8);
                this.turret.add(barrel);
                this.group.add(this.turret);
                scene.add(this.group);
                this.velocity = 0; this.angle = 0; this.armor = 100; this.bullets = []; this.lastShot = 0;
            }
            update() {
                if (this.dead) return;
                const nextX = this.group.position.x + Math.sin(this.angle) * this.velocity;
                const nextZ = this.group.position.z + Math.cos(this.angle) * this.velocity;
                let collided = false;
                for (let obs of obstacles) {
                    if (obs.box.intersectsSphere(new THREE.Sphere(new THREE.Vector3(nextX, 0.5, nextZ), COLLISION_RADIUS))) { collided = true; break; }
                }
                if (!collided) { this.group.position.set(nextX, 0.5, nextZ); }
                this.group.rotation.y = this.angle;
                this.bullets.forEach(b => b.update());
                this.bullets = this.bullets.filter(b => b.active);
            }
            fire() {
                const now = Date.now();
                if (now - this.lastShot > 700) {
                    const pos = new THREE.Vector3(); this.group.getWorldPosition(pos); pos.y += 0.8;
                    this.bullets.push(new Bullet(pos, this.angle, this.type === 'player' ? 0x00ff00 : 0xff0000));
                    this.lastShot = now;
                }
            }
        }

        const player = new Tank(0, 40, 0x228B22, 'player');
        const enemies = [new Tank(0, -40, 0xDC143C, 'enemy')];

        // --- CONTROLS ---
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // Mobile Logic
        let joystickActive = false;
        let joystickInput = { x: 0, y: 0 };
        const knob = document.getElementById('joystick-knob');
        const container = document.getElementById('joystick-container');
        const fireBtn = document.getElementById('fire-button');

        container.addEventListener('touchstart', e => { joystickActive = true; moveJoystick(e); });
        window.addEventListener('touchmove', e => { if (joystickActive) moveJoystick(e); });
        window.addEventListener('touchend', () => { joystickActive = false; knob.style.transform = 'translate(0,0)'; joystickInput = {x:0, y:0}; });
        fireBtn.addEventListener('touchstart', (e) => { e.preventDefault(); player.fire(); });

        function moveJoystick(e) {
            const touch = e.touches[0];
            const rect = container.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.min(Math.hypot(dx, dy), 50);
            const angle = Math.atan2(dy, dx);
            const lx = Math.cos(angle) * dist;
            const ly = Math.sin(angle) * dist;
            knob.style.transform = `translate(${lx}px, ${ly}px)`;
            joystickInput = { x: lx / 50, y: -ly / 50 };
        }

        // --- MAIN LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // PC Input
            if (keys['KeyW']) player.velocity = TANK_SPEED;
            else if (keys['KeyS']) player.velocity = -TANK_SPEED;
            else player.velocity = joystickInput.y * TANK_SPEED;

            if (keys['KeyA']) player.angle += TANK_TURN_SPEED;
            else if (keys['KeyD']) player.angle -= TANK_TURN_SPEED;
            else player.angle -= joystickInput.x * TANK_TURN_SPEED;

            if (keys['Space']) player.fire();

            player.update();
            enemies.forEach(e => {
                const dx = player.group.position.x - e.group.position.x;
                const dz = player.group.position.z - e.group.position.z;
                e.angle = Math.atan2(dx, dz);
                e.velocity = TANK_SPEED * 0.5;
                e.update();
                if (Math.random() < 0.01) e.fire();
            });

            // Camera
            const camTarget = new THREE.Vector3(
                player.group.position.x - Math.sin(player.angle) * 12,
                8,
                player.group.position.z - Math.cos(player.angle) * 12
            );
            camera.position.lerp(camTarget, 0.1);
            camera.lookAt(player.group.position);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
