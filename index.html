<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Tank Battle Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #05050a; color: white; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .stat { font-size: 24px; margin-bottom: 5px; text-shadow: 2px 2px 4px #000; font-weight: bold; }
        #instructions { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); text-align: center; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 12px; border: 1px solid #44f; }
        .red { color: #f44; }
        .blue { color: #44f; }
        .green { color: #4f4; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stat green">Score: <span id="score">0</span></div>
        <div class="stat">Armor: <span id="armor">100</span>%</div>
        <div class="stat blue">Team: <span id="team-count">1</span></div>
        <div class="stat red">Enemies Left: <span id="enemy-count">1</span></div>
    </div>
    <div id="instructions">
        <b style="color:#4f4">W/S</b> Move | <b style="color:#4f4">A/D</b> Rotate | <b style="color:#4f4">SPACE</b> Fire | <b style="color:#4f4">MOUSE</b> Look
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- CONSTANTS ---
        const WORLD_SIZE = 80;
        const TANK_SPEED = 0.18;
        const TANK_TURN_SPEED = 0.045;
        const BULLET_SPEED = 1.0;
        const COLLISION_RADIUS = 1.8;

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0x404080, 0.6);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0x8888ff, 1, 100);
        pointLight.position.set(0, 50, 0);
        scene.add(pointLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(30, 60, 30);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -WORLD_SIZE;
        dirLight.shadow.camera.right = WORLD_SIZE;
        dirLight.shadow.camera.top = WORLD_SIZE;
        dirLight.shadow.camera.bottom = -WORLD_SIZE;
        dirLight.shadow.mapSize.width = 4096;
        dirLight.shadow.mapSize.height = 4096;
        scene.add(dirLight);

        // --- WORLD ---
        const floorGeo = new THREE.PlaneGeometry(WORLD_SIZE * 2.5, WORLD_SIZE * 2.5);
        const floorMat = new THREE.MeshStandardMaterial({
            color: 0x1a1a2e,
            roughness: 0.8,
            metalness: 0.2
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const grid = new THREE.GridHelper(WORLD_SIZE * 2, 40, 0x3333ff, 0x111122);
        scene.add(grid);

        const obstacles = [];
        function createObstacle(x, z, w, h, d, color = 0x444466) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.5 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, h/2, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);

            // For collision
            const box = new THREE.Box3().setFromObject(mesh);
            obstacles.push({ mesh, box });
            return mesh;
        }

        // Map layout
        createObstacle(0, WORLD_SIZE, WORLD_SIZE * 2, 12, 4, 0x222233);
        createObstacle(0, -WORLD_SIZE, WORLD_SIZE * 2, 12, 4, 0x222233);
        createObstacle(WORLD_SIZE, 0, 4, 12, WORLD_SIZE * 2, 0x222233);
        createObstacle(-WORLD_SIZE, 0, 4, 12, WORLD_SIZE * 2, 0x222233);

        createObstacle(20, 20, 8, 6, 8);
        createObstacle(-25, 15, 6, 8, 12);
        createObstacle(10, -35, 15, 6, 6);
        createObstacle(-40, -40, 10, 10, 10);

        // --- EFFECTS ---
        const particles = [];
        function createExplosion(pos, color = 0xffaa00) {
            for (let i = 0; i < 20; i++) {
                const geo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
                const mat = new THREE.MeshBasicMaterial({ color });
                const p = new THREE.Mesh(geo, mat);
                p.position.copy(pos);
                const vel = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.5,
                    Math.random() * 0.5,
                    (Math.random() - 0.5) * 0.5
                );
                particles.push({ mesh: p, vel, life: 1.0 });
                scene.add(p);
            }
        }

        // --- ACTORS ---
        class Bullet {
            constructor(pos, angle, color, owner) {
                const geo = new THREE.SphereGeometry(0.3, 8, 8);
                const mat = new THREE.MeshBasicMaterial({ color });
                this.mesh = new THREE.Mesh(geo, mat);
                this.mesh.position.copy(pos);
                this.velocity = new THREE.Vector3(Math.sin(angle), 0, Math.cos(angle)).multiplyScalar(BULLET_SPEED);
                this.owner = owner;
                this.active = true;
                scene.add(this.mesh);
            }
            update() {
                this.mesh.position.add(this.velocity);
                if (this.mesh.position.length() > WORLD_SIZE * 2) this.destroy();

                // Obstacle collision
                obstacles.forEach(obs => {
                    if (obs.box.containsPoint(this.mesh.position)) {
                        createExplosion(this.mesh.position, 0xaaaaaa);
                        this.destroy();
                    }
                });
            }
            destroy() {
                if (!this.active) return;
                this.active = false;
                scene.remove(this.mesh);
            }
        }

        class Tank {
            constructor(x, z, color, type) {
                this.type = type;
                this.group = new THREE.Group();
                this.group.position.set(x, 0.5, z);

                // Advanced Model
                const hull = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.8, 3.2), new THREE.MeshStandardMaterial({ color, roughness: 0.4 }));
                hull.castShadow = true;
                this.group.add(hull);

                // Treads
                const treadMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
                const treadL = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.6, 3.4), treadMat);
                treadL.position.set(-1.1, -0.2, 0);
                this.group.add(treadL);
                const treadR = treadL.clone();
                treadR.position.x = 1.1;
                this.group.add(treadR);

                // Turret
                this.turret = new THREE.Group();
                const turretBase = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.7, 1.4), new THREE.MeshStandardMaterial({ color, roughness: 0.4 }));
                turretBase.position.y = 0.7;
                turretBase.castShadow = true;
                this.turret.add(turretBase);

                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 2.2), new THREE.MeshStandardMaterial({ color: 0x222222 }));
                barrel.rotation.x = Math.PI / 2;
                barrel.position.set(0, 0.8, 1.6);
                barrel.castShadow = true;
                this.turret.add(barrel);

                this.group.add(this.turret);
                scene.add(this.group);

                this.velocity = 0;
                this.angle = 0;
                this.armor = 100;
                this.lastShot = 0;
                this.bullets = [];
                this.dead = false;
            }

            checkCollision(newX, newZ) {
                // Wall collision
                for (let obs of obstacles) {
                    if (obs.box.intersectsSphere(new THREE.Sphere(new THREE.Vector3(newX, 0.5, newZ), COLLISION_RADIUS))) {
                        return true;
                    }
                }
                return false;
            }

            update() {
                if (this.dead) return;

                let nextX = this.group.position.x + Math.sin(this.angle) * this.velocity;
                let nextZ = this.group.position.z + Math.cos(this.angle) * this.velocity;

                if (!this.checkCollision(nextX, nextZ)) {
                    this.group.position.x = nextX;
                    this.group.position.z = nextZ;
                } else {
                    this.velocity = 0;
                }

                this.group.rotation.y = this.angle;

                this.bullets.forEach(b => b.update());
                this.bullets = this.bullets.filter(b => b.active);
            }

            fire() {
                if (this.dead) return;
                const now = Date.now();
                if (now - this.lastShot > 800) {
                    const pos = new THREE.Vector3();
                    this.group.getWorldPosition(pos);
                    pos.y += 0.8;
                    const bullet = new Bullet(pos, this.angle, this.type === 'player' ? 0x00ff00 : 0xffaa00, this);
                    this.bullets.push(bullet);
                    this.lastShot = now;
                }
            }

            takeDamage(dmg) {
                if (this.dead) return;
                this.armor -= dmg;
                createExplosion(this.group.position, 0xff5500);
                if (this.armor <= 0) this.destroy();
            }

            destroy() {
                this.dead = true;
                createExplosion(this.group.position, 0xffffff);
                scene.remove(this.group);
            }
        }

        const player = new Tank(0, 40, 0x228B22, 'player');
        const teammates = [new Tank(-10, 40, 0x4169E1, 'teammate')];
        const enemies = [new Tank(0, -40, 0xDC143C, 'enemy')];

        // UI
        const scoreEl = document.getElementById('score');
        const armorEl = document.getElementById('armor');
        const enemyCountEl = document.getElementById('enemy-count');
        let score = 0;

        // --- CONTROLS ---
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // --- GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.mesh.position.add(p.vel);
                p.life -= 0.02;
                p.mesh.scale.setScalar(p.life);
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }

            if (!player.dead) {
                if (keys['KeyW']) player.velocity = TANK_SPEED;
                else if (keys['KeyS']) player.velocity = -TANK_SPEED;
                else player.velocity = 0;

                if (keys['KeyA']) player.angle += TANK_TURN_SPEED;
                if (keys['KeyD']) player.angle -= TANK_TURN_SPEED;
                if (keys['Space']) player.fire();

                player.update();

                // Smooth Camera
                const camDist = 12;
                const camHeight = 7;
                const targetCamPos = new THREE.Vector3(
                    player.group.position.x - Math.sin(player.angle) * camDist,
                    player.group.position.y + camHeight,
                    player.group.position.z - Math.cos(player.angle) * camDist
                );
                camera.position.lerp(targetCamPos, 0.1);
                camera.lookAt(player.group.position);

                armorEl.innerText = Math.max(0, player.armor);
            }

            // AI Update
            enemies.forEach((e, ei) => {
                if (e.dead) return;

                // Track player
                const dx = player.group.position.x - e.group.position.x;
                const dz = player.group.position.z - e.group.position.z;
                const dist = Math.hypot(dx, dz);
                const targetAngle = Math.atan2(dx, dz);

                // Simple AI turn
                const angleDiff = targetAngle - e.angle;
                e.angle += Math.sign(angleDiff) * 0.02;

                if (dist > 15) e.velocity = TANK_SPEED * 0.7;
                else e.velocity = 0;

                e.update();
                if (dist < 30 && Math.random() < 0.01) e.fire();

                // Player bullet collisions
                player.bullets.forEach(b => {
                    if (b.active && b.mesh.position.distanceTo(e.group.position) < COLLISION_RADIUS) {
                        e.takeDamage(40);
                        b.destroy();
                        if (e.dead) {
                            score += 500;
                            scoreEl.innerText = score;
                            setTimeout(() => {
                                e.dead = false;
                                e.armor = 100;
                                e.group.position.set(Math.random()*60-30, 0.5, -50);
                                scene.add(e.group);
                            }, 4000);
                        }
                    }
                });
            });

            teammates.forEach(t => {
                if (t.dead) return;
                const nearestEnemy = enemies.find(en => !en.dead);
                if (nearestEnemy) {
                    const dx = nearestEnemy.group.position.x - t.group.position.x;
                    const dz = nearestEnemy.group.position.z - t.group.position.z;
                    t.angle = Math.atan2(dx, dz);
                    t.velocity = TANK_SPEED * 0.5;
                    if (Math.random() < 0.01) t.fire();
                }
                t.update();

                // Teammate bullets hit enemies
                t.bullets.forEach(b => {
                    enemies.forEach(e => {
                        if (!e.dead && b.mesh.position.distanceTo(e.group.position) < COLLISION_RADIUS) {
                            e.takeDamage(20);
                            b.destroy();
                        }
                    });
                });
            });

            // Enemy bullets hit player
            enemies.forEach(e => {
                e.bullets.forEach(b => {
                    if (b.active && b.mesh.position.distanceTo(player.group.position) < COLLISION_RADIUS) {
                        player.takeDamage(10);
                        b.destroy();
                    }
                });
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        enemyCountEl.innerText = enemies.filter(e => !e.dead).length;
        animate();
    </script>
</body>
</html>
